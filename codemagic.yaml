workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.iglesia.app
      vars:
        APP_ID: 6670887373 # Your App Store Connect app ID
        BUNDLE_ID: "com.iglesia.app"
        XCODE_WORKSPACE: "Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up Firebase configuration files
        script: |
          chmod +x scripts/setup_firebase_config.sh
          ./scripts/setup_firebase_config.sh
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Patch flutter_quill for current Flutter (safety net)
        script: |
          python3 - <<'PY'
          from pathlib import Path

          files = list(Path.home().glob(
              ".pub-cache/hosted/pub.dev/flutter_quill-*/lib/src/editor/raw_editor/raw_editor_state.dart"
          ))
          if not files:
              print("flutter_quill raw_editor_state.dart not found; skipping patch")
              raise SystemExit(0)

          for file in files:
              text = file.read_text()
              if "onFocusReceived" in text:
                  print(f"{file} already implements onFocusReceived; skipping")
                  continue

              marker = "class QuillRawEditorState extends EditorState"
              start = text.find(marker)
              brace = text.find("{", start)
              if start == -1 or brace == -1:
                  print(f"Could not patch {file}; skipping")
                  continue

              patch = "\n  @override\n  bool onFocusReceived() => false;\n"
              file.write_text(text[:brace + 1] + patch + text[brace + 1:])
              print(f"Patched {file}")
          PY
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter unit tests
        script: |
          flutter test
        ignore_failure: true
      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --build-name=2.3.9 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      # See the following link for details about email publishing - https://docs.codemagic.io/publishing-yaml/distribution/#email
      email:
        recipients:
          - joselerc.dev@gmail.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        
  android-workflow:
    name: Android Workflow
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      android_signing:
        - keystore_reference
      vars:
        PACKAGE_NAME: "com.iglesia.app"
      flutter: stable
      java: 17
    scripts:
      - name: Set up Firebase configuration files
        script: |
          chmod +x scripts/setup_firebase_config.sh
          ./scripts/setup_firebase_config.sh
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Patch flutter_quill for current Flutter (safety net)
        script: |
          python3 - <<'PY'
          from pathlib import Path

          files = list(Path.home().glob(
              ".pub-cache/hosted/pub.dev/flutter_quill-*/lib/src/editor/raw_editor/raw_editor_state.dart"
          ))
          if not files:
              print("flutter_quill raw_editor_state.dart not found; skipping patch")
              raise SystemExit(0)

          for file in files:
              text = file.read_text()
              if "onFocusReceived" in text:
                  print(f"{file} already implements onFocusReceived; skipping")
                  continue

              marker = "class QuillRawEditorState extends EditorState"
              start = text.find(marker)
              brace = text.find("{", start)
              if start == -1 or brace == -1:
                  print(f"Could not patch {file}; skipping")
                  continue

              patch = "\n  @override\n  bool onFocusReceived() => false;\n"
              file.write_text(text[:brace + 1] + patch + text[brace + 1:])
              print(f"Patched {file}")
          PY
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter unit tests
        script: |
          flutter test
        ignore_failure: true
      - name: Build APK with Flutter
        script: |
          flutter build apk --release \
            --build-name=2.3.9 \
            --build-number=$BUILD_NUMBER
      - name: Build App Bundle
        script: |
          flutter build appbundle --release \
            --build-name=2.3.9 \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/mapping.txt
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - joselerc.dev@gmail.com
        notify:
          success: true
          failure: false
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true 